<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>코니 CONY</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{width:220px;background:#13131f;color:#e8e8f0;font-family:sans-serif;padding:16px;display:flex;flex-direction:column;align-items:center;gap:12px}
  .logo{font-size:28px;margin-bottom:2px}
  h1{font-size:14px;font-weight:700;color:#a855f7;text-align:center;line-height:1.3}
  p{font-size:10px;color:#888;text-align:center;line-height:1.5}
  .btn{width:100%;padding:10px;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .15s}
  .btn-main{background:#a855f7;color:#fff}
  .btn-main:hover{opacity:.85}
  .btn-sub{background:#1e1e2e;color:#a855f7;border:1px solid #a855f7;margin-top:2px}
  .btn-sub:hover{background:#a855f720}
  .divider{width:100%;height:1px;background:#2a2a3e}
  .ver{font-size:9px;color:#555}
</style>
</head>
<body>
<div class="logo">🧶</div>
<h1>코니 CONY</h1>
<p>멈춰도 돼, 포기만 안 하면</p>
<div class="divider"></div>
<button class="btn btn-main" id="btn-open">앱 열기 (새 탭)</button>
<button class="btn btn-sub" id="btn-web">웹 버전 열기</button>
<div class="divider"></div>
<span class="ver">v1.0.0 · Chrome Extension</span>
<script src="popup.js"></script>
</body>
</html>
